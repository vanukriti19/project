<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Amazon Clone</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="navbar">

        <div class="logo">
            amazon
        </div>

        <div class="address">
            <p>Deliver to</p>
            <h4>India</h4>
        </div>

        <div class="search">

            <select>
                <option>All</option>
            </select>

            <input type="text" placeholder="Search Amazon">

            <button>
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>

        </div>

        <div class="nav-text">
            <p>Hello, sign in</p>
            <h4>Account & Lists</h4>
        </div>

        <div class="nav-text">
            <p>Returns</p>
            <h4>& Orders</h4>
        </div>

        <div class="cart">
            <i class="fa-solid fa-cart-shopping"></i>
            Cart
        </div>

    </div>

    <div class="panel">
        <p><i class="fa-solid fa-bars"></i> All</p>
        <p>Today's Deals</p>
        <p>Customer Service</p>
        <p>Registry</p>
        <p>Gift Cards</p>
        <p>Sell</p>
    </div>

    <div class="hero"></div>

    <div class="shop">

        <div class="box">
            <h2>Clothes</h2>

            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=800&q=80"
                alt="Clothes">

            <p>See more</p>
        </div>

        <div class="box">
            <h2>Electronics</h2>

            <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&w=800&q=80"
                alt="Electronics">

            <p>See more</p>
        </div>

        <div class="box">
            <h2>Beauty</h2>

            <img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348?auto=format&fit=crop&w=800&q=80"
                alt="Beauty Products">

            <p>See more</p>
        </div>

        <div class="box">
            <h2>Home</h2>

            <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=800&q=80"
                alt="Home Decor">

            <p>See more</p>
        </div>

    </div>

    <div class="footer1">
        Back to Top
    </div>

    <div class="footer2">
        Amazon Clone © 2026
    </div>

</body>

</html>
